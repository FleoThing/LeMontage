reelflow: "1.0"
name: ufc-top3
description: "Test : les 3 moments les plus forts du combat, en clips verticaux sous-titrés"

vars:
  lang: fr

input:
  type: video
  source: ./video-example.mp4

steps:
  # Transcription FR (sert aux sous-titres)
  - id: transcript
    stt:
      model: small
      lang: "{{ vars.lang }}"
    cache: true
    on_failure: retry
    retries: 2

  # Top 3 des pics sonores (cadrage auto autour de chaque moment fort)
  - id: moments
    detect_clips:
      method: loudness
      min_duration: 12s
      max_duration: 30s
      max_clips: 3
      emit: reel

  # Découpe des 3 extraits, en parallèle
  - cut:
      from: reel

  # Sous-titres TikTok (courts) sur chaque extrait
  - captions:
      from: reel
      segments: "{{ steps.transcript.segments }}"
      style: tiktok
      position: bottom
      max_chars: 32
    requires: transcript.success

  # Export vertical + titre permanent avec le numéro de partie ({{ part }} = 1,2,3)
  - export:
      from: reel
      format: vertical
      resolution: 1080x1920
      fps: 30
      title: "UFC Maison Blanche\n#{{ part }} / 3"
      title_font: font3       # Bangers (téléchargée en local)
      title_size: 56
      title_margin: 300
      output: "./output/{{ name }}-{{ index }}.mp4"

  # Recoller les 3 extraits en une seule vidéo finale
  - concat:
      from: reel
      output: "./output/{{ name }}-reel.mp4"

output:
  dir: ./output
