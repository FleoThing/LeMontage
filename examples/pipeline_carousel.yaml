lemontage: "1.0"
name: carousel
description: "A loudness highlight then a photo carousel (slide transitions) joined into one vertical video, with a persistent title + author burned once over the whole reel"

# The pipeline input is the video the highlight branch works on. The carousel
# branch reads a folder of images via a per-step `input:` override on `stills`.
input:
  type: video
  source: ./video-example.mp4

steps:
  # === Sub-pipeline A: the loudness highlight -> one clip ===================
  # Per-clip export only normalises size/framing (fit: cover); the title/author
  # are added later, once, over the final reel — so they don't travel with the
  # clips during slide transitions.
  - id: hl-detect
    detect_clips:
      input: ./video-example.mp4
      method: loudness
      max_clips: 1
      min_duration: 6s
      max_duration: 10s
      emit: highlight
  - cut:
      from: highlight
  - export:
      from: highlight
      format: vertical
      fit: cover
  - id: hl-reel
    concat:
      from: highlight
      output: "./output/intro.mp4"   # distinct output (else it collides with the carousel reel)
      emit: intro

  # === Sub-pipeline B: the photo carousel -> one clip ======================
  - id: shots
    stills:
      input: ./photos/     # folder of images (jpg/png/webp)
      duration: 2s
      emit: carousel
  - still:                 # each image -> a 2s video clip (no audio)
      from: carousel
  - export:
      from: carousel
      format: vertical
      fit: cover           # crop each photo to fill the vertical frame
  - id: carousel-reel
    concat:
      from: carousel
      # 5 photos -> 4 gaps: alternate slide directions between the photos.
      transitions: [slideleft, slideright, slideleft, slideright]
      duration: 0.2s        # quick slide (default is 0.5s)
      output: "./output/slideshow.mp4"
      emit: slideshow

  # === Join the two clips, then title the whole reel once ==================
  - id: final
    concat:
      from: [intro, slideshow]
      transitions: fade
      emit: reel           # the assembled reel, as a channel
  - id: titled
    export:
      from: reel           # title + author burned ONCE, over everything —
      title: "Good Title"  # so it stays fixed while the images slide beneath
      title_position: top
      title_box: true
      author: fillouxdev
      author_position: bottom-center
      author_size: 60
      output: "./output/{{ name }}.mp4"

output:
  dir: ./output
