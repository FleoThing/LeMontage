lemontage: "1.0"
name: ufc-highlights
description: "Vertical highlights from a UFC fight, with a persistent title and captions"

vars:
  lang: fr          # commentary is in French (audio track 'fra')

input:
  type: video
  source: ./video-example.mp4

steps:
  # 1. Transcribe the commentary (VAD removes crowd noise)
  - id: transcript
    stt:
      model: small
      lang: "{{ vars.lang }}"
      vad_filter: true
      beam_size: 5
    cache: true
    on_failure: retry
    retries: 2

  # 2. The most viral moment = the loudest audio window (crowd + commentator).
  #    Clip boundaries are found automatically around the peak; min/max only
  #    bound the length. max_clips: 1 -> keep ONLY the KO / the finish.
  - id: moments
    detect_clips:
      method: loudness
      min_duration: 12s
      max_duration: 40s
      max_clips: 1
      emit: highlights

  # 3. Cut each highlight, in parallel
  - cut:
      from: highlights

  # 4. Word-by-word karaoke captions (TikTok/CapCut style), at the bottom
  - captions:
      from: highlights
      words: "{{ steps.transcript.words }}"
      style: tiktok
      position: bottom
      max_chars: 32
    requires: transcript.success

  # 5. Vertical 1080x1920 export + persistent title at the top, for the whole clip
  - export:
      from: highlights
      format: vertical
      resolution: 1080x1920
      fps: 30
      title: "UFC Maison Blanche\nCyril Gane vs Pereira"
      title_font: font2      # font1..font5 (social presets) or an installed font name
      title_size: 62
      title_margin: 330
      output: "./output/{{ name }}-{{ index }}.mp4"

output:
  dir: ./output
