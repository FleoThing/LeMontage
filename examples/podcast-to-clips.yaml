lemontage: "1.0"
name: podcast-to-clips
description: "Turn a long podcast into short captioned vertical clips"

input:
  type: video
  source: ./video-example.mp4

steps:
  - id: transcript
    stt:
      model: base
      lang: fr

  - id: clips
    detect_clips:
      method: silence
      min_duration: 30s
      max_duration: 60s
      max_clips: 5
      emit: clip_channel

  - cut:
      from: clip_channel

  - captions:
      from: clip_channel
      segments: "{{ steps.transcript.segments }}"
      style: tiktok
      burn: true

  - export:
      from: clip_channel
      format: vertical
      resolution: 1080x1920

output:
  dir: ./output
