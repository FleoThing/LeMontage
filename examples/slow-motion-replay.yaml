lemontage: "1.0"
name: slow-motion-replay
description: "Find the peak moment, slow it to half-speed for a dramatic replay, caption and export vertical"

vars:
  lang: fr

input:
  type: video
  source: ./video-example.mp4

steps:
  # 1. Transcribe the commentary (used later for captions)
  - id: transcript
    stt:
      model: small
      lang: "{{ vars.lang }}"
      vad_filter: true
    cache: true

  # 2. The loudest window = the moment to replay. Keep only the single peak.
  - id: moments
    detect_clips:
      method: loudness
      min_duration: 6s
      max_duration: 15s
      max_clips: 1
      emit: highlights

  # 3. Cut the highlight out of the source
  - cut:
      from: highlights

  # 4. Slow it to half-speed for a dramatic slow-motion replay.
  #    Mapped over the channel: each clip is retimed in place, so the captions
  #    and export below operate on the slowed clip. factor < 1 = slow-motion,
  #    factor > 1 = fast-forward (e.g. factor: 2 for a 2x speed-ramp).
  - speed:
      from: highlights
      factor: 0.5

  # 5. Karaoke captions on the slowed clip
  - captions:
      from: highlights
      words: "{{ steps.transcript.words }}"
      style: tiktok
      position: bottom
    requires: transcript.success

  # 6. Vertical export
  - export:
      from: highlights
      format: vertical
      resolution: 1080x1920
      fps: 30
      output: "./output/{{ name }}-{{ index }}.mp4"

output:
  dir: ./output
