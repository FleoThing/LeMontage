lemontage: "1.0"
name: clips
description: "Split a long video into short captioned vertical clips"

input:
  type: video
  source: ./video-example.mp4

steps:
  - id: transcript
    stt:
      model: base
      lang: auto

  - id: clips
    detect_clips:
      method: silence
      min_duration: 30s
      max_duration: 60s
      max_clips: 5
      # Snap clip boundaries to whole words and attach each clip's spoken text,
      # so an AI agent can pick a precise start/end from the transcript.
      words: "{{ steps.transcript.words }}"
      emit: clip_channel

  - cut:
      from: clip_channel

  - captions:
      from: clip_channel
      segments: "{{ steps.transcript.segments }}"
      style: tiktok
      burn: true

  - export:
      from: clip_channel
      format: vertical
      resolution: 1080x1920

output:
  dir: ./output
